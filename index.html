<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Tool Hub | Advanced PDF & Image Utilities</title>
    <meta name="description" content="Professional suite of PDF and Image tools. Merge, split, resize, and edit files securely in your browser.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">

    <div id="toast" class="opacity-0 pointer-events-none transition-all duration-300 fixed bottom-6 right-6 px-5 py-3 rounded-xl text-white text-sm font-semibold shadow-2xl flex items-center space-x-2 z-50"></div>

    <header class="bg-white shadow-sm py-4 border-b border-slate-200">
        <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
            <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">Pro<span class="text-blue-600">Tool</span>Hub</h1>
        </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto px-6 py-10 w-full space-y-10">
        <div id="tools-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>

        <div id="tool-workspace-box" class="hidden transition-all duration-500 bg-white p-8 rounded-3xl shadow-lg border border-slate-100">
            <div id="canvas-content" class="max-w-3xl mx-auto"></div>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 py-6 text-center text-sm">
        <p>&copy; 2026 Pro Tool Hub. All processing is done locally on your device for maximum privacy.</p>
    </footer>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
