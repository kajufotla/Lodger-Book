<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <title>Free Online PDF Tools: Merge, Split, and Convert Securely</title> 
    <meta name="description" content="Manage documents effortlessly with our modern, client-side PDF tools. Instantly merge, split, and convert PDFs locally in your browser. 100% secure, offline, and free." /> 
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>

<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <nav class="pt-safe sticky top-0 z-40 w-full glass-panel shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-2 text-2xl font-extrabold text-blue-600 tracking-tight">
                <i class="fa-solid fa-layer-group text-xl text-indigo-500"></i>
                <span>PDF<span class="text-indigo-600">Expert</span></span>
            </div>
            <div class="hidden md:flex items-center space-x-8 font-medium text-slate-600 text-sm">
                <a href="#" class="text-blue-600 border-b-2 border-blue-600 pb-1">Home</a>
                <a href="#about" class="hover:text-blue-600 transition">About Tools</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow">
        <header class="max-w-7xl mx-auto px-6 pt-16 pb-12 grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
            <div class="lg:col-span-6 space-y-6" id="hero-workspace">
                <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight">Free Online PDF Tools</h1>
            </div>
            <div class="lg:col-span-6 flex justify-center">
                <div class="w-full max-w-lg glass-panel shadow-xl rounded-3xl p-8" id="tool-workspace-box">
                    <div id="canvas-content" class="text-center py-8">
                        <h2 class="text-xl font-bold">Select a Module</h2>
                    </div>
                </div>
            </div>
        </header>

        <section id="our-tools" class="max-w-7xl mx-auto px-6 py-12 border-t border-slate-200/50">
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="tools-grid">
            </div>
        </section>
    </main>

    <div id="toast" class="fixed bottom-6 right-6 px-5 py-3 rounded-xl text-white text-xs font-semibold shadow-2xl z-50 transform transition-all duration-300 translate-y-20 opacity-0 flex"></div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
