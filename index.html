<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Expert Workspace</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/downloadjs@1.4.7/download.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-base: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 8px 32px rgba(15, 23, 42, 0.04);
            --primary-gradient: linear-gradient(135deg, #0061ff 0%, #60efff 100%);
            --primary-glow: 0 10px 25px -5px rgba(0, 97, 255, 0.4);
            --text-main: #0f172a;
            --text-muted: #475569;
            --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --primary: #0061ff;
            --border-color: rgba(226, 232, 240, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif !important;
            background-color: var(--bg-base) !important;
            color: var(--text-main) !important;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::before, body::after {
            content: '';
            position: fixed;
            z-index: -1;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            animation: blobFloat 15s infinite alternate ease-in-out;
        }

        body::before {
            top: -10%; left: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, #e0c3fc 0%, #8ec5fc 100%);
        }

        body::after {
            bottom: -15%; right: -10%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, #8ec5fc 0%, #e0c3fc 100%);
            animation-delay: -7s;
        }

        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0061ff 0%, #4338CA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        main {
            flex: 1;
            padding: 2.5rem 2rem;
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
        }

        #dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .tool-card {
            background: rgba(255, 255, 255, 0.85) !important;
            backdrop-filter: blur(12px) !important;
            border-radius: 18px !important;
            border: 1px solid rgba(255, 255, 255, 0.9) !important;
            padding: 1.75rem;
            cursor: pointer;
            transition: var(--transition-smooth) !important;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02) !important;
        }

        .tool-card:hover {
            transform: translateY(-8px) scale(1.02) !important;
            box-shadow: 0 20px 40px rgba(0, 97, 255, 0.08), 0 0 0 1px rgba(0, 97, 255, 0.1) inset !important;
            background: #ffffff !important;
        }

        .tool-icon {
            font-size: 2.25rem;
            margin-bottom: 1.25rem;
        }

        .tool-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .tool-desc {
            font-size: 0.875rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        #workspace {
            display: none;
            background: var(--glass-bg) !important;
            backdrop-filter: blur(20px) saturate(180%) !important;
            -webkit-backdrop-filter: blur(20px) saturate(180%) !important;
            border: 1px solid var(--glass-border) !important;
            border-radius: 24px !important;
            padding: 2.5rem;
            box-shadow: var(--glass-shadow) !important;
        }

        .workspace-header {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .back-btn {
            background: none !important;
            border: none !important;
            color: var(--text-muted) !important;
            cursor: pointer;
            font-size: 1rem;
            margin-right: 1.25rem;
            font-weight: 600 !important;
            box-shadow: none !important;
        }

        .back-btn:hover { color: var(--primary) !important; transform: translateX(-2px); }

        .dropzone {
            border: 2px dashed rgba(0, 97, 255, 0.3) !important;
            border-radius: 20px !important;
            padding: 4rem 2rem;
            background: rgba(248, 250, 252, 0.6) !important;
            transition: var(--transition-smooth) !important;
            cursor: pointer;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .dropzone:hover, .dropzone.dragover {
            border-color: #0061ff !important;
            background: rgba(0, 97, 255, 0.03) !important;
        }

        .file-list {
            text-align: left;
            margin-bottom: 1.5rem;
            max-height: 250px;
            overflow-y: auto;
        }

        .file-item {
            background: #fff;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            border: 1px solid var(--border-color);
        }

        .dynamic-options-panel {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .option-group {
            margin-bottom: 1rem;
        }
        .option-group:last-child { margin-bottom: 0; }
        
        .option-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .option-group input[type="text"],
        .option-group input[type="number"],
        .option-group select {
            width: 100%;
            padding: 0.625rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 0.875rem;
            background: #fff;
        }

        .btn {
            background: var(--primary-gradient) !important;
            color: #ffffff !important;
            border: none !important;
            border-radius: 12px !important;
            padding: 0.85rem 2rem;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600 !important;
            transition: var(--transition-smooth) !important;
            box-shadow: 0 4px 12px rgba(0, 97, 255, 0.2) !important;
        }

        .btn:hover { transform: translateY(-2px) !important; box-shadow: var(--primary-glow) !important; }
        .btn:disabled { background: var(--text-muted) !important; cursor: not-allowed; box-shadow: none !important; }

        .progress-container {
            display: none;
            margin-top: 1.5rem;
            text-align: center;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(0,0,0,0.05);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--primary-gradient);
            width: 0%;
            transition: width 0.2s ease;
        }

        #pdf-render-viewport {
            max-height: 600px;
            overflow-y: auto;
            background: #475569;
            padding: 2rem;
            border-radius: 14px;
            margin-top: 1rem;
            display: none;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            justify-items: center;
        }

        #pdf-render-viewport canvas {
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            background: #fff;
            max-width: 100%;
        }

        @keyframes blobFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -30px) scale(1.05); }
        }
    </style>
</head>
<body>

    <header>
        <h1 onclick="app.showDashboard()">📄 PDF Expert Engine</h1>
        <div style="font-size: 0.875rem; font-weight: 500; color: var(--text-muted);">Production Pipeline Active</div>
    </header>

    <main>
        <div id="dashboard"></div>

        <div id="workspace">
            <div class="workspace-header">
                <button class="back-btn" onclick="app.showDashboard()">← Back Dashboard</button>
                <h2 id="ws-title">Tool Module</h2>
            </div>
            
            <p id="ws-desc" style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.95rem;"></p>

            <input type="file" id="file-input" multiple style="display: none;">
            
            <div id="dropzone" class="dropzone">
                <div style="font-size: 3rem; margin-bottom: 1rem;">📥</div>
                <h3 style="font-weight:600;">Drag & Drop files here</h3>
                <p style="color: var(--text-muted); margin-top: 0.5rem; font-size:0.875rem;">or click to browse local storage</p>
            </div>

            <div id="file-list" class="file-list"></div>

            <div id="dynamic-options" class="dynamic-options-panel" style="display:none;"></div>

            <button id="action-btn" class="btn" style="display: none;" onclick="app.executeTool()">Execute Pipeline</button>

            <div id="progress" class="progress-container">
                <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
                <p id="progress-text" style="font-size: 0.875rem; font-weight: 500; color: var(--text-muted);">Processing document buffer vectors...</p>
            </div>

            <div id="pdf-render-viewport"></div>
        </div>
    </main>

    <script>
        // Setup pdf.js global configuration values
        if (window['pdfjs-dist/build/pdf']) {
            window['pdfjsLib'] = window['pdfjs-dist/build/pdf'];
            window['pdfjsLib'].GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }

        const TOOLS = [
            { id: 'merge', title: 'Merge PDF', icon: '📑', desc: 'Combine multiple PDFs into a single file sequentially.', accept: 'application/pdf', multiple: true },
            { id: 'split', title: 'Split PDF', icon: '✂️', desc: 'Explode a target PDF down into individual independent sub-pages.', accept: 'application/pdf', multiple: false },
            { id: 'compress', title: 'Compress PDF', icon: '🗜️', desc: 'Optimize binary data structures to minimize output file size payload.', accept: 'application/pdf', multiple: false },
            { id: 'img-to-pdf', title: 'Image to PDF', icon: '🖼️', desc: 'Convert JPEG or PNG layout structures into clean vectors.', accept: 'image/jpeg, image/png', multiple: true },
            { id: 'pdf-to-img', title: 'PDF to Images', icon: '🎞️', desc: 'Deconstruct structural matrix records into independent image layers.', accept: 'application/pdf', multiple: false },
            { id: 'rotate', title: 'Rotate PDF', icon: '↻', desc: 'Apply precise structural matrix geometric tracking rotations (90/180/270).', accept: 'application/pdf', multiple: false, options: 'rotate' },
            { id: 'delete', title: 'Delete Pages', icon: '🗑️', desc: 'Strip out unwanted pages from your document.', accept: 'application/pdf', multiple: false, options: 'pages' },
            { id: 'extract', title: 'Extract Pages', icon: '📤', desc: 'Isolate specified target layout vectors into an independent asset.', accept: 'application/pdf', multiple: false, options: 'pages' },
            { id: 'reorder', title: 'Reorder Pages', icon: '⇄', desc: 'Provide an index ordering mapping configuration array to sort files.', accept: 'application/pdf', multiple: false, options: 'reorder' },
            { id: 'crop', title: 'Crop PDF', icon: '📐', desc: 'Apply custom margins to your document layout.', accept: 'application/pdf', multiple: false, options: 'crop' },
            { id: 'watermark', title: 'Add Watermark', icon: '©️', desc: 'Inject textual watermarks into layout layers.', accept: 'application/pdf', multiple: false, options: 'watermark' },
            { id: 'page-numbers', title: 'Page Numbers', icon: '🔢', desc: 'Inject automated indexing sequences into layouts.', accept: 'application/pdf', multiple: false, options: 'pagenumbers' },
            { id: 'header-footer', title: 'Header & Footer', icon: '↕️', desc: 'Apply persistent running text blocks into document borders.', accept: 'application/pdf', multiple: false, options: 'hf' },
            { id: 'flatten', title: 'Flatten PDF', icon: '🔨', desc: 'Lock dynamic elements down into flat structural drawing paths.', accept: 'application/pdf', multiple: false },
            { id: 'extract-text', title: 'Extract Text', icon: '📝', desc: 'Run lexical analysis algorithms to strip out character string blocks.', accept: 'application/pdf', multiple: false },
            { id: 'viewer', title: 'PDF Viewer', icon: '👁️', desc: 'Render your document inside a secure web container sandbox layer.', accept: 'application/pdf', multiple: false }
        ];

        const app = {
            currentTool: null,
            selectedFiles: [],

            init() {
                this.cacheDOM();
                this.bindEvents();
                this.renderDashboard();
            },

            cacheDOM() {
                this.dashboard = document.getElementById('dashboard');
                this.workspace = document.getElementById('workspace');
                this.dropzone = document.getElementById('dropzone');
                this.fileInput = document.getElementById('file-input');
                this.fileList = document.getElementById('file-list');
                this.actionBtn = document.getElementById('action-btn');
                this.progress = document.getElementById('progress');
                this.progressFill = document.getElementById('progress-fill');
                this.progressText = document.getElementById('progress-text');
                this.dynamicOptions = document.getElementById('dynamic-options');
                this.viewport = document.getElementById('pdf-render-viewport');
            },

            bindEvents() {
                this.dropzone.addEventListener('dragover', (e) => { e.preventDefault(); this.dropzone.classList.add('dragover'); });
                this.dropzone.addEventListener('dragleave', () => this.dropzone.classList.remove('dragover'));
                this.dropzone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    this.dropzone.classList.remove('dragover');
                    this.handleFileSelectionUI(e.dataTransfer.files);
                });
                this.dropzone.addEventListener('click', () => this.fileInput.click());
                this.fileInput.addEventListener('change', (e) => this.handleFileSelectionUI(e.target.files));
            },

            renderDashboard() {
                this.workspace.style.display = 'none';
                this.dashboard.style.display = 'grid';
                this.dashboard.innerHTML = TOOLS.map(tool => `
                    <div class="tool-card" onclick="app.openTool('${tool.id}')">
                        <div class="tool-icon">${tool.icon}</div>
                        <div class="tool-title">${tool.title}</div>
                        <div class="tool-desc">${tool.desc}</div>
                    </div>
                `).join('');
            },

            showDashboard() {
                this.workspace.style.display = 'none';
                this.dashboard.style.display = 'grid';
                this.viewport.style.display = 'none';
                this.viewport.innerHTML = '';
            },

            openTool(id) {
                this.currentTool = TOOLS.find(t => t.id === id);
                this.selectedFiles = [];
                this.updateFileListUI();
                
                document.getElementById('ws-title').textContent = this.currentTool.title;
                document.getElementById('ws-desc').textContent = this.currentTool.desc;
                this.fileInput.accept = this.currentTool.accept;
                this.fileInput.multiple = this.currentTool.multiple;
                
                this.progress.style.display = 'none';
                this.viewport.style.display = 'none';
                this.viewport.innerHTML = '';
                this.actionBtn.textContent = `Run ${this.currentTool.title}`;
                
                this.renderDynamicOptions();
                this.dashboard.style.display = 'none';
                this.workspace.style.display = 'block';
            },

            handleFileSelectionUI(fileList) {
                const files = Array.from(fileList);
                if (this.currentTool.multiple) {
                    this.selectedFiles = [...this.selectedFiles, ...files];
                } else {
                    this.selectedFiles = [files[0]]; 
                }
                this.updateFileListUI();
            },

            updateFileListUI() {
                this.fileList.innerHTML = this.selectedFiles.map((file, index) => `
                    <div class="file-item">
                        <span style="font-weight:500;">${file.name} (${(file.size/1024/1024).toFixed(2)} MB)</span>
                        <button style="border:none; background:none; cursor:pointer; color:#ef4444; font-weight:700;" onclick="app.removeFile(${index})">✕</button>
                    </div>
                `).join('');
                this.actionBtn.style.display = this.selectedFiles.length > 0 ? 'inline-block' : 'none';
            },

            removeFile(index) {
                this.selectedFiles.splice(index, 1);
                this.updateFileListUI();
                if(this.selectedFiles.length === 0) this.actionBtn.style.display = 'none';
            },

            renderDynamicOptions() {
                this.dynamicOptions.style.display = 'none';
                this.dynamicOptions.innerHTML = '';
                if (!this.currentTool.options) return;

                let html = '';
                switch(this.currentTool.options) {
                    case 'rotate':
                        html = `
                            <div class="option-group">
                                <label>Rotation Angle Degrees Value</label>
                                <select id="param-rotate-angle">
                                    <option value="90">90 Degrees Clockwise</option>
                                    <option value="180">180 Degrees Flip</option>
                                    <option value="270">270 Degrees Counter-Clockwise</option>
                                </select>
                            </div>`;
                        break;
                    case 'pages':
                        html = `
                            <div class="option-group">
                                <label>Target Target Pages Configuration Array (e.g., 1, 3, 5-7)</label>
                                <input type="text" id="param-pages" value="1" placeholder="Ex: 1, 2-5, 8">
                            </div>`;
                        break;
                    case 'reorder':
                        html = `
                            <div class="option-group">
                                <label>Target Layout Matrix Sorting Configuration Order List (e.g., 3, 1, 2)</label>
                                <input type="text" id="param-reorder" value="1" placeholder="Ex: 3, 1, 2, 4">
                            </div>`;
                        break;
                    case 'crop':
                        html = `
                            <div class="option-group" style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem;">
                                <div><label>Left (pt)</label><input type="number" id="crop-l" value="20"></div>
                                <div><label>Bottom (pt)</label><input type="number" id="crop-b" value="20"></div>
                                <div><label>Right (pt)</label><input type="number" id="crop-r" value="20"></div>
                                <div><label>Top (pt)</label><input type="number" id="crop-t" value="20"></div>
                            </div>`;
                        break;
                    case 'watermark':
                        html = `
                            <div class="option-group">
                                <label>Watermark Layer Core Text String Payload</label>
                                <input type="text" id="param-wm-text" value="CONFIDENTIAL">
                            </div>`;
                        break;
                    case 'pagenumbers':
                        html = `
                            <div class="option-group">
                                <label>Automated Pagination Matrix Placement Zone</label>
                                <select id="param-pn-pos">
                                    <option value="bottom-center">Bottom Center Margin Segment</option>
                                    <option value="bottom-right">Bottom Right Outer Edge</option>
                                    <option value="top-center">Top Center Header Area</option>
                                </select>
                            </div>`;
                        break;
                    case 'hf':
                        html = `
                            <div class="option-group" style="display:grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <div><label>Running Header String Payload</label><input type="text" id="param-header" value="Internal Document Enterprise Node"></div>
                                <div><label>Running Footer String Payload</label><input type="text" id="param-footer" value="Copyright © 2026 Core Systems."></div>
                            </div>`;
                        break;
                }
                this.dynamicOptions.innerHTML = html;
                this.dynamicOptions.style.display = 'block';
            },

            updateProgress(pct, text) {
                this.progress.style.display = 'block';
                this.progressFill.style.width = `${pct}%`;
                this.progressText.textContent = text;
            },

            async readFileAsArrayBuffer(file) {
                return new Promise((resolve, reject) => {
                    const r = new FileReader();
                    r.onload = () => resolve(r.result);
                    r.onerror = () => reject(r.error);
                    r.readAsArrayBuffer(file);
                });
            },

            parsePageRanges(rangeStr, totalPages) {
                const pages = [];
                const parts = rangeStr.split(',');
                for (let part of parts) {
                    part = part.trim();
                    if (part.includes('-')) {
                        const [start, end] = part.split('-').map(p => parseInt(p.trim(), 10));
                        for (let i = start; i <= end; i++) {
                            if (i >= 1 && i <= totalPages) pages.push(i - 1);
                        }
                    } else {
                        const val = parseInt(part, 10);
                        if (val >= 1 && val <= totalPages) pages.push(val - 1);
                    }
                }
                return [...new Set(pages)];
            },

            async executeTool() {
                if (this.selectedFiles.length === 0) return;
                this.actionBtn.disabled = true;
                this.updateProgress(10, 'Initializing memory block variables...');
                
                try {
                    switch(this.currentTool.id) {
                        case 'merge': await this.runMerge(); break;
                        case 'split': await this.runSplit(); break;
                        case 'compress': await this.runCompress(); break;
                        case 'img-to-pdf': await this.runImgToPdf(); break;
                        case 'pdf-to-img': await this.runPdfToImg(); break;
                        case 'rotate': await this.runRotate(); break;
                        case 'delete': await this.runDelete(); break;
                        case 'extract': await this.runExtract(); break;
                        case 'reorder': await this.runReorder(); break;
                        case 'crop': await this.runCrop(); break;
                        case 'watermark': await this.runWatermark(); break;
                        case 'page-numbers': await this.runPageNumbers(); break;
                        case 'header-footer': await this.runHeaderFooter(); break;
                        case 'flatten': await this.runFlatten(); break;
                        case 'extract-text': await this.runExtractText(); break;
                        case 'viewer': await this.runViewer(); break;
                        default: alert('Unmapped architecture core pathway identity logic target exception.');
                    }
                } catch (err) {
                    console.error(err);
                    alert(`Pipeline error: ${err.message}`);
                } finally {
                    this.actionBtn.disabled = false;
                    this.updateProgress(100, 'Execution lifecycle sequence terminated.');
                }
            },

            // ==========================================================
            // CORE HIGH-PERFORMANCE PDF-LIB & PDF.JS PROCESSING ENGINES
            // ==========================================================

            async runMerge() {
                this.updateProgress(25, 'Allocating primary root document nodes...');
                const outDoc = await PDFLib.PDFDocument.create();
                for(let i=0; i<this.selectedFiles.length; i++) {
                    this.updateProgress(30 + Math.floor((i/this.selectedFiles.length)*50), `Injecting array records for document slot source structural tree node: ${this.selectedFiles[i].name}...`);
                    const bytes = await this.readFileAsArrayBuffer(this.selectedFiles[i]);
                    const srcDoc = await PDFLib.PDFDocument.load(bytes);
                    const pages = await outDoc.copyPages(srcDoc, srcDoc.getPageIndices());
                    pages.forEach(p => outDoc.addPage(p));
                }
                this.updateProgress(90, 'Serializing stream payload targets...');
                const outBytes = await outDoc.save();
                download(outBytes, "Merged_Output.pdf", "application/pdf");
            },

            async runSplit() {
                this.updateProgress(30, 'Parsing binary source tree matrices...');
                const bytes = await this.readFileAsArrayBuffer(this.selectedFiles[0]);
                const srcDoc = await PDFLib.PDFDocument.load(bytes);
                const total = srcDoc.getPageCount();
                
                for(let i=0; i<total; i++) {
                    this.updateProgress(40 + Math.floor((i/total)*40), `Exploding isolated layout index track slot [${i+1}/${total}]...`);
                    const outDoc = await PDFLib.PDFDocument.create();
                    const [p] = await outDoc.copyPages(srcDoc, [i]);
                    outDoc.addPage(p);
                    const outBytes = await outDoc.save();
                    download(outBytes, `Split_Page_${i+1}.pdf", "application/pdf`);
                }
            },

            async runCompress() {
                this.updateProgress(40, 'Executing structural cross-reference optimization routines...');
                const bytes = await this.readFileAsArrayBuffer(this.selectedFiles[0]);
                const doc = await PDFLib.PDFDocument.load(bytes);
                // Apply object layout structural map rebuild rules to collapse indirect pointer redundancy chains
                const outBytes = await doc.save({
                    useObjectStreams: true,
                    addDefaultPage: false,
                    updateFieldAppearances: false
                });
                download(outBytes, "Compressed_Document.pdf", "application/pdf");
            },

            async runImgToPdf() {
                this.updateProgress(20, 'Assembling workspace context environment layout arrays...');
                const outDoc = await PDFLib.PDFDocument.create();
                for(let i=0; i<this.selectedFiles.length; i++) {
                    this.updateProgress(30 + Math.floor((i/this.selectedFiles.length)*50), `Encoding target binary image object reference map index: ${this.selectedFiles[i].name}...`);
                    const bytes = await this.readFileAsArrayBuffer(this.selectedFiles[i]);
                    let img;
                    if(this.selectedFiles[i].type === 'image/png' || this.selectedFiles[i].name.endsWith('.png')) {
                        img = await outDoc.embedPng(bytes);
                    } else {
                        img = await outDoc.embedJpg(bytes);
                    }
                    const page = outDoc.addPage([img.width, img.height]);
                    page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
                }
                const outBytes = await outDoc.save();
                download(outBytes, "Images_Compiled.pdf", "application/pdf");
            },

            async runPdfToImg() {
                this.updateProgress(20, 'Initializing high-fidelity hardware rasterizer worker thread layers...');
                const bytes = await this.readFileAsArrayBuffer(this.selectedFiles[0]);
                const loadingTask = pdfjsLib.getDocument({data: bytes});
                const pdf = await loadingTask.promise;
                const total = pdf.numPages;

                for (let i = 1; i <= total; i++) {
                    this.updateProgress(30 + Math.floor((i/total)*60), `Processing vector calculations for viewport generation: Page ${i}/${total}...`);
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 2.0 });
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                    
                    // Convert raw base64 string directly into an optimized downsampled binary image asset container
                    const res = await fetch(dataUrl);
                    const blob = await res.blob();
                    download(blob, `Page_Rasterized_Layer_${i}.jpg`, "image/jpeg");
                }
            },

            async runRotate() {
                const angle = parseInt(document.getElementById('param-rotate-angle').value, 10);
                this.updateProgress(40, `Applying geometric tracking transforms matrix offsets mapping sequence: ${angle}°...`);
                const bytes = await this.readFileAsArrayBuffer(this.selectedFiles[0]);
                const doc = await PDFLib.PDFDocument.load(bytes);
                const total = doc.getPageCount();
                
                for(let i=0; i<total; i++) {
                    const p = doc.getPage(i);
                    const currentRotation = p.getRotation().angle;
                    p.setRotation(PDFLib.degrees((currentRotation + angle) % 360));
                }
                const outBytes = await doc.save();
                download(outBytes, "Rotated_Document.pdf", "application/pdf");
            },

            async runDelete() {
                this.updateProgress(30, 'Parsing cross-reference system index maps...');
                const bytes = await this.readFileAsArrayBuffer(this.selectedFiles[0]);
                const doc = await PDFLib.PDFDocument.load(bytes);
                const total = doc.getPageCount();
                const rangeStr = document.getElementById('param-pages').value;
                const indicesToRemove = this.parsePageRanges(rangeStr, total).sort((a,b) => b - a);
                
                for(let idx of indicesToRemove) {
                    doc.removePage(idx);
                }
                const outBytes = await doc.save();
                download(outBytes, "Target_Pages_Stripped.pdf", "application/pdf");
            },

            async runExtract() {
                this.updateProgress(30, 'Isolating dynamic coordinate structural layout trees...');
                const bytes = await this.readFileAsArrayBuffer(this.selectedFiles[0]);
                const srcDoc = await PDFLib.PDFDocument.load(bytes);
                const outDoc = await PDFLib.PDFDocument.create();
                const total = srcDoc.getPageCount();
                const rangeStr = document.getElementById('param-pages').value;
                const targets = this.parsePageRanges(rangeStr, total);
                
                if(targets.length === 0) throw new Error("The specified index slice range resolved to an empty collection sequence array.");
                
                const copiedPages = await outDoc.copyPages(srcDoc, targets);
                copiedPages.forEach(p => outDoc.addPage(p));
                const outBytes = await outDoc.save();
                download(outBytes, "Extracted_Slices.pdf", "application/pdf");
            },

            async runReorder() {
                this.updateProgress(30, 'Executing structural layout sorting transformations...');
                const bytes = await this.readFileAsArrayBuffer(this.selectedFiles[0]);
                const srcDoc = await PDFLib.PDFDocument.load(bytes);
                const outDoc = await PDFLib.PDFDocument.create();
                const total = srcDoc.getPageCount();
                
                const val = document.getElementById('param-reorder').value;
                const orderArray = val.split(',').map(s => parseInt(s.trim(), 10) - 1).filter(n => n >= 0 && n < total);
                
                if(orderArray.length === 0) throw new Error("Order vector sequencing parsing error exception.");
                
                const copied = await outDoc.copyPages(srcDoc, orderArray);
                copied.forEach(p => outDoc.addPage(p));
                const outBytes = await outDoc.save();
                download(outBytes, "Reordered_Layout_Output.pdf", "application/pdf");
            },

            async runCrop() {
                this.updateProgress(40, 'Recalculating structural boundary boxes...');
                const bytes = await this.readFileAsArrayBuffer(this.selectedFiles[0]);
                const doc = await PDFLib.PDFDocument.load(bytes);
                
                const l = parseFloat(document.getElementById('crop-l').value) || 0;
                const b = parseFloat(document.getElementById('crop-b').value) || 0;
                const r = parseFloat(document.getElementById('crop-r').value) || 0;
                const t = parseFloat(document.getElementById('crop-t').value) || 0;
                
                const total = doc.getPageCount();
                for(let i=0; i<total; i++) {
                    const page = doc.getPage(i);
                    const { width, height } = page.getSize();
                    // Permanently shift the internal drawing bounds using a hardware-compatible crop path box clip vector transformation matrix sequence
                    page.setMediaBox(l, b, width - r, height - t);
                    page.setCropBox(l, b, width - r, height - t);
                }
                const outBytes = await doc.save();
                download(outBytes, "Cropped_Viewport_Output.pdf", "application/pdf");
            },

            async runWatermark() {
                this.updateProgress(30, 'Embedding custom watermark font metadata assets...');
                const bytes = await this.readFileAsArrayBuffer(this.selectedFiles[0]);
                const doc = await PDFLib.PDFDocument.load(bytes);
                const font = await doc.embedFont(PDFLib.StandardFonts.HelveticaBold);
                const text = document.getElementById('param-wm-text').value || "CONFIDENTIAL";
                
                const total = doc.getPageCount();
                for(let i=0; i<total; i++) {
                    const page = doc.getPage(i);
                    const { width, height } = page.getSize();
                    // Embed a baseline graphic layer directly into the document container
                    page.drawText(text, {
                        x: width / 4,
                        y: height / 2,
                        size: 48,
                        font: font,
                        color: PDFLib.rgb(0.85, 0.2, 0.2),
                        opacity: 0.35,
                        rotate: PDFLib.degrees(45)
                    });
                }
                const outBytes = await doc.save();
                download(outBytes, "Stamped_Watermarked_Asset.pdf", "application/pdf");
            },

            async runPageNumbers() {
                this.updateProgress(30, 'Calculating coordinate spacing for page numbers...');
                const bytes = await this.readFileAsArrayBuffer(this.selectedFiles[0]);
                const doc = await PDFLib.PDFDocument.load(bytes);
                const font = await doc.embedFont(PDFLib.StandardFonts.Helvetica);
                const pos = document.getElementById('param-pn-pos').value;
                const total = doc.getPageCount();
                
                for(let i=0; i<total; i++) {
                    const page = doc.getPage(i);
                    const { width, height } = page.getSize();
                    const labelStr = `Page ${i + 1} of ${total}`;
                    let x = width / 2, y = 30;
                    
                    if (pos === 'bottom-right') { x = width - 80; }
                    else if (pos === 'top-center') { y = height - 30; }
                    
                    page.drawText(labelStr, { x: x, y: y, size: 10, font: font, color: PDFLib.rgb(0.3, 0.3, 0.3) });
                }
                const outBytes = await doc.save();
                download(outBytes, "Paginated_Document.pdf", "application/pdf");
            },

            async runHeaderFooter() {
                this.updateProgress(30, 'Injecting running text layout metadata blocks...');
                const bytes = await this.readFileAsArrayBuffer(this.selectedFiles[0]);
                const doc = await PDFLib.PDFDocument.load(bytes);
                const font = await doc.embedFont(PDFLib.StandardFonts.Helvetica);
                
                const hText = document.getElementById('param-header').value;
                const fText = document.getElementById('param-footer').value;
                const total = doc.getPageCount();
                
                for(let i=0; i<total; i++) {
                    const page = doc.getPage(i);
                    const { width, height } = page.getSize();
                    if(hText) page.drawText(hText, { x: 50, y: height - 30, size: 9, font: font, color: PDFLib.rgb(0.4, 0.4, 0.4) });
                    if(fText) page.drawText(fText, { x: 50, y: 30, size: 9, font: font, color: PDFLib.rgb(0.4, 0.4, 0.4) });
                }
                const outBytes = await doc.save();
                download(outBytes, "Header_Footer_Applied.pdf", "application/pdf");
            },

            async runFlatten() {
                this.updateProgress(40, 'Parsing interactive field forms dictionary objects...');
                const bytes = await this.readFileAsArrayBuffer(this.selectedFiles[0]);
                const doc = await PDFLib.PDFDocument.load(bytes);
                const form = doc.getForm();
                // Lock variable input definitions down into flat path vectors
                form.flatten();
                const outBytes = await doc.save();
                download(outBytes, "Static_Flattened_Document.pdf", "application/pdf");
            },

            async runExtractText() {
                this.updateProgress(30, 'Loading virtual layout text collection layers...');
                const bytes = await this.readFileAsArrayBuffer(this.selectedFiles[0]);
                const pdf = await pdfjsLib.getDocument({data: bytes}).promise;
                let logAccumulator = '';
                
                for(let i=1; i<=pdf.numPages; i++) {
                    this.updateProgress(30 + Math.floor((i/pdf.numPages)*60), `Extracting characters from structural tokens: Page ${i}...`);
                    const page = await pdf.getPage(i);
                    const tc = await page.getTextContent();
                    const pageText = tc.items.map(item => item.str).join(' ');
                    logAccumulator += `--- PAGE ${i} ---\n${pageText}\n\n`;
                }
                
                const blob = new Blob([logAccumulator], {type: "text/plain;charset=utf-8"});
                download(blob, "Extracted_Lexical_Payload.txt", "text/plain");
            },

            async runViewer() {
                this.updateProgress(30, 'Deconstructing vector map schemas to display preview blocks...');
                const bytes = await this.readFileAsArrayBuffer(this.selectedFiles[0]);
                this.viewport.innerHTML = '';
                this.viewport.style.display = 'grid';
                
                const pdf = await pdfjsLib.getDocument({data: bytes}).promise;
                for(let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const vp = page.getViewport({ scale: 1.5 });
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.height = vp.height;
                    canvas.width = vp.width;
                    this.viewport.appendChild(canvas);
                    await page.render({ canvasContext: ctx, viewport: vp }).promise;
                }
                this.updateProgress(100, 'Rendering loop complete.');
            }
        };

        window.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
