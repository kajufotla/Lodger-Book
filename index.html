<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFExpert Suite - Modern PDF Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col bg-slate-50">
    
    <nav class="pt-safe sticky top-0 z-40 w-full glass-panel shadow-sm bg-white/80 backdrop-blur-md p-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <h1 class="text-xl font-bold text-blue-600">PDFExpert</h1>
        </div>
    </nav>

    <main class="flex-grow p-6 max-w-7xl mx-auto w-full">
        <div id="tools-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>
        
        <div class="mt-10 w-full max-w-lg mx-auto glass-panel shadow-xl rounded-3xl p-8 transition-all" id="tool-workspace-box">
            <div id="canvas-content" class="text-center py-8">
                <h2 class="text-xl font-bold">Select a Tool</h2>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
