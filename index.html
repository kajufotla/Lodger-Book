<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFExpert | Advanced PDF & Image Utilities</title>
    <meta name="description" content="Professional suite of PDF and Image tools. Merge, split, resize, and edit files securely in your browser. All processing is local.">
    
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col selection:bg-blue-200 selection:text-blue-900">

    <div id="toast" role="alert" aria-live="assertive" aria-atomic="true" class="opacity-0 pointer-events-none transition-all duration-300 fixed bottom-6 right-6 px-5 py-3 rounded-xl text-white text-sm font-semibold shadow-2xl flex items-center space-x-2 z-50 transform translate-y-4"></div>

    <header class="bg-white shadow-sm py-4 border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
            <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight" aria-label="PDFExpert Home">
                PDF<span class="text-blue-600">Expert</span>
            </h1>
            <div class="text-sm font-semibold text-slate-500 hidden sm:block tracking-wide">
                Hamid Hussain & Co.
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto px-6 py-10 w-full space-y-10 relative">
        
        <div id="tools-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5" role="list">
            </div>

        <div id="tool-workspace-box" class="hidden transition-all duration-500 bg-white p-8 rounded-3xl shadow-lg border border-slate-100 relative">
            
            <div id="global-dropzone" class="hidden absolute inset-0 bg-blue-50/95 backdrop-blur-sm z-30 rounded-3xl border-4 border-dashed border-blue-400 flex-col items-center justify-center transition-all">
                <i class="fa-solid fa-cloud-arrow-up text-6xl text-blue-500 mb-4 animate-bounce"></i>
                <h2 class="text-2xl font-bold text-blue-800">Drop files to upload</h2>
                <p class="text-blue-600 mt-2 font-medium">Supported files will be added to the workspace</p>
            </div>

            <div id="canvas-content" class="max-w-3xl mx-auto">
                </div>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 py-6 text-center text-sm mt-auto">
        <p>&copy; 2026 PDFExpert by Hamid Hussain & Co. All processing is done locally on your device for maximum privacy.</p>
    </footer>

    <script defer src="config.js"></script>
    <script defer src="script.js"></script>
</body>
</html>
