<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PDFExpert - Single File Version</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
  body { font-family: sans-serif; }
</style>
</head>

<body class="bg-slate-50">

<header class="p-4 bg-white shadow font-bold">
  PDFExpert Single File
</header>

<main class="p-6 max-w-5xl mx-auto">

<!-- TOOLS -->
<div id="tools-grid" class="grid grid-cols-2 gap-4"></div>

<!-- WORKSPACE -->
<div id="tool-workspace-box" class="hidden mt-6 p-4 bg-white border rounded">
  
  <div id="global-dropzone" class="hidden p-10 border-2 border-dashed text-center text-blue-500">
    Drop files here
  </div>

  <div id="canvas-content"></div>
</div>

</main>

<script>
/* =========================
   GLOBAL STATE
========================= */
window.ActiveFiles = [];

const DOM = {
  dropzone: document.getElementById('global-dropzone'),
  workspaceBox: document.getElementById('tool-workspace-box'),
  canvas: document.getElementById('canvas-content'),
  toolsGrid: document.getElementById('tools-grid')
};

/* =========================
   APP UI CORE
========================= */
class AppUI {

  static _init = false;
  static current = { multiple:false, accept:'*' };

  static _prevent(e){
    e.preventDefault();
    e.stopPropagation();
  }

  static setupDragAndDrop(multiple, accept){

    this.current = { multiple, accept };

    const ws = DOM.workspaceBox;
    if(!ws) return;

    if(!this._init){

      document.body.addEventListener('dragover', this._prevent);
      document.body.addEventListener('drop', this._prevent);

      document.body.addEventListener('drop', (e)=>{
        DOM.dropzone.classList.add('hidden');
        if(e.dataTransfer?.files?.length){
          this.handleFiles(e.dataTransfer.files);
        }
      });

      document.body.addEventListener('dragenter', ()=>{
        DOM.dropzone.classList.remove('hidden');
      });

      document.body.addEventListener('dragleave', ()=>{
        DOM.dropzone.classList.add('hidden');
      });

      this._init = true;
    }

    ws.classList.remove('hidden');
  }

  static handleFiles(files){
    alert("Files received: " + files.length);
  }

  static openTool(tool){
    DOM.canvas.innerHTML = tool.render(tool);
    DOM.workspaceBox.classList.remove('hidden');
    this.setupDragAndDrop(tool.multiple, tool.accept);
  }
}

/* =========================
   TOOLS CONFIG
========================= */
const ToolsConfig = {
  imgToPdf:{
    name:"Image to PDF",
    multiple:true,
    accept:"image/*",
    render:()=>`
      <h2 class="font-bold mb-3">Image to PDF</h2>
      <input type="file" multiple accept="image/*" />
    `
  },

  merge:{
    name:"Merge PDF",
    multiple:true,
    accept:".pdf",
    render:()=>`
      <h2 class="font-bold mb-3">Merge PDF</h2>
      <input type="file" multiple accept=".pdf" />
    `
  },

  split:{
    name:"Split PDF",
    multiple:false,
    accept:".pdf",
    render:()=>`
      <h2 class="font-bold mb-3">Split PDF</h2>
      <input type="file" accept=".pdf" />
    `
  }
};

/* =========================
   RENDER TOOLS
========================= */
function renderTools(){
  DOM.toolsGrid.innerHTML = Object.entries(ToolsConfig).map(([id,t])=>`
    <button class="p-4 bg-white border rounded shadow hover:bg-slate-100"
      onclick="AppUI.openTool(ToolsConfig['${id}'])">
      <div class="font-bold">${t.name}</div>
    </button>
  `).join('');
}

renderTools();

</script>

</body>
</html>
