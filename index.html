<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Expert Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">PDF EXPERT</div>
        <nav>
            <a href="#">Home</a> <a href="#">All Tools</a> <a href="#">Merge</a>
        </nav>
    </header>

    <main>
        <h1>PDF EXPERT</h1>
        <p>All-in-One PDF Solution – 100% Free, Secure & Easy to Use</p>
        
        <div class="upload-section">
            <div class="drop-zone">
                <p>Drop your PDF files here</p>
                <button>Choose Files</button>
                <p class="max-size">Maximum file size: 100MB</p>
            </div>
        </div>

        <section class="tools-grid">
            <div class="tool-card"><h3>Merge PDF</h3></div>
            <div class="tool-card"><h3>Split PDF</h3></div>
            <div class="tool-card"><h3>Compress PDF</h3></div>
            <div class="tool-card"><h3>PDF to Word</h3></div>
            <div class="tool-card"><h3>Word to PDF</h3></div>
            <div class="tool-card"><h3>PDF to JPG</h3></div>
            <div class="tool-card"><h3>JPG to PDF</h3></div>
            <div class="tool-card"><h3>Rotate PDF</h3></div>
            <div class="tool-card"><h3>Delete Pages</h3></div>
        </section>
    </main>
</body>
</html>
