    <!-- Main Content -->
    <main class="flex-grow max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full relative">
        
        <div class="text-center mb-10">
            <h2 class="text-3xl font-extrabold text-slate-900 sm:text-4xl">Client-Side PDF Utilities</h2>
            <p class="mt-4 text-lg text-slate-500">Fast, secure, and offline processing directly in your browser.</p>
        </div>

        <!-- Global Dropzone Overlay -->
        <div id="dropzone" class="hidden fixed inset-0 z-50 bg-slate-900/80 backdrop-blur-sm flex-col items-center justify-center text-white border-[10px] border-blue-500 border-dashed m-4 rounded-3xl transition-all">
            <i class="fa-solid fa-cloud-arrow-up text-7xl mb-6 animate-bounce text-blue-400"></i>
            <h3 class="text-4xl font-bold">Drop files to start processing</h3>
        </div>

        <!-- THE WORKSPACE (Handles both Grid and Active Tool) -->
        <div id="workspace-box" class="glass-panel p-6 sm:p-10 rounded-3xl relative overflow-hidden min-h-[400px]">
            
            <!-- VIEW 1: TOOLS GRID (Main Menu) -->
            <div id="tools-grid-container" class="transition-opacity duration-500">
                <div id="tools-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                    <!-- Cards injected automatically by JS -->
                </div>
            </div>

            <!-- VIEW 2: ACTIVE TOOL WORKSPACE (Hidden by default) -->
            <div id="active-tool-view" class="hidden animate-fade-in flex-col h-full">
                
                <!-- Navigation & Tool Header -->
                <div class="flex items-center justify-between mb-8 pb-6 border-b border-slate-200/60">
                    <div class="flex items-center gap-5">
                        <div id="tool-header-icon-container" class="w-16 h-16 rounded-2xl flex items-center justify-center text-white shadow-lg text-3xl">
                            <i id="tool-header-icon" class="fa-solid"></i>
                        </div>
                        <div>
                            <h2 id="tool-header-title" class="text-2xl font-bold text-slate-800"></h2>
                            <p id="tool-header-desc" class="text-slate-500 text-sm mt-1"></p>
                        </div>
                    </div>
                    <button onclick="AppUI.closeTool()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-5 py-2.5 rounded-xl text-sm font-bold transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-arrow-left-long"></i> Back
                    </button>
                </div>

                <!-- Dynamic UI Injection Point (Uploader + Settings from Config) -->
                <div id="tool-dynamic-ui" class="flex-grow"></div>

                <!-- Action Button -->
                <div class="mt-8 pt-6 border-t border-slate-200/60 flex justify-end">
                    <button id="process-btn" onclick="AppUI.showToast('Processing initialized...', 'success')" class="bg-slate-900 hover:bg-blue-600 text-white font-bold py-3.5 px-10 rounded-xl shadow-xl shadow-slate-900/20 hover:shadow-blue-600/30 transition-all transform hover:-translate-y-1 flex items-center gap-3">
                        <span id="process-btn-text" class="text-lg">Process Files</span>
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                    </button>
                </div>
            </div>

        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 px-6 py-3 rounded-xl text-white font-medium shadow-2xl transition-all duration-300 transform translate-y-20 opacity-0 z-50 flex items-center gap-3"></div>

    <footer class="bg-white border-t border-slate-200 mt-auto">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-sm text-slate-500">&copy; 2026 PDFExpert. Developed by <span class="font-bold text-slate-900">Hamid Hussain & Co.</span></p>
        </div>
    </footer>

    <!-- ========================================== -->
    <!-- ENTERPRISE-GRADE JAVASCRIPT LOGIC -->
    <!-- ========================================== -->
    <script>
        // 1. CONFIGURATION (Your original flawless config)
        const ToolsConfig = {
            resizer: { name: "Image Resizer", desc: "Resize image dimensions offline securely.", icon: "fa-compress", color: "bg-red-500", border: "border-b-[3px] border-b-red-500", render: (t) => AppUI.renderComplexInput(t, true, "image/jpeg, image/png, image/webp") + `<div class="mt-5 bg-slate-50 border border-slate-200 rounded-xl p-5"><h4 class="font-bold text-sm mb-3">Settings</h4><input type="number" placeholder="Width (px)" class="p-2 border rounded mr-2"><input type="number" placeholder="Height (px)" class="p-2 border rounded"></div>` },
            merge: { name: "Merge PDF", desc: "Combine multiple PDFs into a single document.", icon: "fa-object-group", color: "bg-blue-600", border: "border-b-[3px] border-b-blue-600", render: (t) => AppUI.renderComplexInput(t, true, ".pdf") },
            split: { name: "Split PDF", desc: "Extract specific pages or split into a ZIP.", icon: "fa-scissors", color: "bg-emerald-600", border: "border-b-[3px] border-b-emerald-600", render: (t) => AppUI.renderComplexInput(t, false, ".pdf") + `<div class="mt-5 bg-slate-50 border border-slate-200 rounded-xl p-5"><label class="text-xs font-bold text-slate-500">Pages to Extract</label><input type="text" placeholder="e.g. 1-5, 8" class="w-full mt-2 p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500"></div>` },
            rotate: { name: "Rotate Pages", desc: "Rotate specific pages or the document.", icon: "fa-rotate-right", color: "bg-purple-600", border: "border-b-[3px] border-b-purple-600", render: (t) => AppUI.renderComplexInput(t, false, ".pdf") },
            del: { name: "Delete Page", desc: "Remove specific pages from a PDF.", icon: "fa-file-circle-minus", color: "bg-amber-500", border: "border-b-[3px] border-b-amber-500", render: (t) => AppUI.renderComplexInput(t, false, ".pdf") },
            extract: { name: "Extract Page", desc: "Isolate a single page into a new PDF.", icon: "fa-file-export", color: "bg-orange-500", border: "border-b-[3px] border-b-orange-500", render: (t) => AppUI.renderComplexInput(t, false, ".pdf") },
            reorder: { name: "Reverse PDF", desc: "Flip the document's page order backwards.", icon: "fa-arrow-down-up-across-line", color: "bg-pink-600", border: "border-b-[3px] border-b-pink-600", render: (t) => AppUI.renderComplexInput(t, false, ".pdf") },
            watermark: { name: "Watermark", desc: "Stamp custom text across your document.", icon: "fa-stamp", color: "bg-cyan-600", border: "border-b-[3px] border-b-cyan-600", render: (t) => AppUI.renderComplexInput(t, false, ".pdf") + `<div class="mt-5 bg-slate-50 border border-slate-200 rounded-xl p-5"><input type="text" placeholder="Watermark Text..." class="w-full p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-cyan-500"></div>` },
            numbers: { name: "Page Numbers", desc: "Inject customizable sequence digits.", icon: "fa-list-ol", color: "bg-teal-500", border: "border-b-[3px] border-b-teal-500", render: (t) => AppUI.renderComplexInput(t, false, ".pdf") + `<div class="mt-5 bg-slate-50 border border-slate-200 rounded-xl p-5"><label class="text-xs font-bold text-slate-500 mb-2 block">Apply to Pages (Leave empty for all)</label><input type="text" id="pg-range-numbers" placeholder="e.g. 2-5, 8" class="w-full px-4 py-3 rounded-lg border border-slate-300 text-sm focus:ring-2 focus:ring-teal-500 outline-none bg-white"></div>` },
            imgToPdf: { name: "Image to PDF", desc: "Convert photos or scanned images to PDF.", icon: "fa-images", color: "bg-indigo-600", border: "border-b-[3px] border-b-indigo-600", render: (t) => AppUI.renderComplexInput(t, true, "image/jpeg, image/png, image/webp") }
        };

        // 2. GLOBAL STATE
        window.ActiveFiles = [];
        window.CurrentTool = null;

        const DOM = {
            gridContainer: document.getElementById('tools-grid-container'),
            toolsGrid: document.getElementById('tools-grid'),
            activeView: document.getElementById('active-tool-view'),
            dynamicUI: document.getElementById('tool-dynamic-ui'),
            dropzone: document.getElementById('dropzone'),
            toast: document.getElementById('toast')
        };

        // 3. CORE UI CLASS
        class AppUI {
            
            // Render the Homepage Grid
            static renderToolsGrid() {
                DOM.toolsGrid.innerHTML = '';
                for (const key in ToolsConfig) {
                    const tool = ToolsConfig[key];
                    const cardHtml = `
                        <div class="bg-white rounded-2xl p-5 flex items-center gap-4 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 cursor-pointer border border-slate-100 ${tool.border}" onclick="AppUI.openTool('${key}')">
                            <div class="w-14 h-14 rounded-xl flex shrink-0 items-center justify-center text-white text-2xl shadow-inner ${tool.color}">
                                <i class="fa-solid ${tool.icon}"></i>
                            </div>
                            <div>
                                <h3 class="font-bold text-slate-800 text-[17px] mb-1">${tool.name}</h3>
                                <p class="text-slate-500 text-xs leading-relaxed">${tool.desc}</p>
                            </div>
                        </div>
                    `;
                    DOM.toolsGrid.insertAdjacentHTML('beforeend', cardHtml);
                }
            }

            // MAGIC HAPPENS HERE: Open Tool Workspace & Render Settings
            static openTool(key) {
                window.CurrentTool = key;
                const tool = ToolsConfig[key];
                
                // Switch Views
                DOM.gridContainer.classList.add('hidden');
                DOM.activeView.classList.remove('hidden');

                // Populate Header
                document.getElementById('tool-header-icon').className = `fa-solid ${tool.icon}`;
                document.getElementById('tool-header-icon-container').className = `w-16 h-16 rounded-2xl flex items-center justify-center text-white shadow-lg text-3xl ${tool.color}`;
                document.getElementById('tool-header-title').innerText = tool.name;
                document.getElementById('tool-header-desc').innerText = tool.desc;
                document.getElementById('process-btn-text').innerText = `${tool.name} Now`;

                // Render specific Upload Box + Options from Config
                DOM.dynamicUI.innerHTML = tool.render(key);

                // Reset state for new tool
                window.ActiveFiles = [];
                AppUI.renderFileList();
            }

            // Close Tool and return to Home
            static closeTool() {
                DOM.activeView.classList.add('hidden');
                DOM.gridContainer.classList.remove('hidden');
                window.ActiveFiles = [];
                window.CurrentTool = null;
                DOM.dynamicUI.innerHTML = ''; 
            }

            // Generates the highly professional Drag & Drop Box
            static renderComplexInput(toolId, multiple, accept) {
                const acceptText = accept === '.pdf' ? 'PDF Documents' : 'Images (JPG, PNG, WebP)';
                return `
                    <div id="file-drop-area" class="border-2 border-dashed border-slate-300 rounded-2xl p-10 text-center bg-white hover:bg-slate-50 hover:border-blue-500 transition-all cursor-pointer group relative overflow-hidden" onclick="document.getElementById('hidden-file-input').click()">
                        <input type="file" id="hidden-file-input" class="hidden" ${multiple ? 'multiple' : ''} accept="${accept}" onchange="AppUI.handleFileSelect(event)">
                        
                        <div class="transform group-hover:scale-110 transition-transform duration-300 pointer-events-none">
                            <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i class="fa-solid fa-cloud-arrow-up text-4xl text-blue-600"></i>
                            </div>
                        </div>
                        <h3 class="text-xl font-bold text-slate-800 mb-2 pointer-events-none">Click to upload or drag and drop</h3>
                        <p class="text-sm text-slate-500 pointer-events-none">Supports: <span class="font-semibold text-slate-700">${acceptText}</span></p>
                        
                        <div id="file-list-container" class="mt-6 flex flex-col gap-3 text-left w-full max-w-xl mx-auto" onclick="event.stopPropagation()"></div>
                    </div>
                `;
            }

            // Handle hidden input selection
            static handleFileSelect(event) {
                if (event.target.files.length > 0) {
                    AppUI.processNewFiles(event.target.files);
                }
            }

            // Process Files Array
            static processNewFiles(files) {
                const newFiles = Array.from(files);
                const isMultiple = ToolsConfig[window.CurrentTool].render.toString().includes('true'); // Checking if tool allows multiple
                
                if (!isMultiple) {
                    window.ActiveFiles = [newFiles[0]]; // Replace if only single allowed
                } else {
                    window.ActiveFiles.push(...newFiles); // Append if multiple allowed
                }
                
                AppUI.renderFileList();
                AppUI.showToast(`${newFiles.length} file(s) added successfully!`, 'success');
            }

            // Render beautifully styled file items inside the drop zone
            static renderFileList() {
                const container = document.getElementById('file-list-container');
                if (!container) return;
                
                container.innerHTML = '';
                
                if(window.ActiveFiles.length > 0) {
                    container.classList.add('mt-8', 'pt-6', 'border-t', 'border-slate-200');
                } else {
                    container.classList.remove('mt-8', 'pt-6', 'border-t', 'border-slate-200');
                }

                window.ActiveFiles.forEach((file, index) => {
                    const icon = file.type.includes('pdf') ? 'fa-file-pdf text-red-500' : 'fa-image text-blue-500';
                    const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
                    
                    container.innerHTML += `
                        <div class="flex items-center justify-between bg-slate-50 border border-slate-200 p-3 rounded-xl shadow-sm hover:shadow-md transition-shadow">
                            <div class="flex items-center gap-4 overflow-hidden">
                                <i class="fa-solid ${icon} text-2xl"></i>
                                <div class="overflow-hidden">
                                    <p class="text-sm font-bold text-slate-800 truncate w-48 sm:w-64">${file.name}</p>
                                    <p class="text-xs font-medium text-slate-500">${sizeMB} MB</p>
                                </div>
                            </div>
                            <button onclick="AppUI.removeFile(${index})" class="w-8 h-8 flex items-center justify-center rounded-lg bg-red-100 text-red-600 hover:bg-red-600 hover:text-white transition-colors" title="Remove File">
                                <i class="fa-solid fa-trash-can text-sm"></i>
                            </button>
                        </div>
                    `;
                });
            }

            static removeFile(index) {
                window.ActiveFiles.splice(index, 1);
                AppUI.renderFileList();
            }

            // Premium Toast Notification
            static showToast(message, type = "success") {
                const bg = type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600';
                const icon = type === 'success' ? 'fa-circle-check' : type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-info';
                
                DOM.toast.className = `fixed bottom-6 right-6 px-5 py-4 rounded-2xl text-white font-medium shadow-2xl z-50 flex items-center gap-3 transition-all duration-300 ${bg} transform translate-y-0 opacity-100`;
                DOM.toast.innerHTML = `<i class="fa-solid ${icon} text-xl"></i> <span>${message}</span>`;
                
                setTimeout(() => {
                    DOM.toast.classList.replace('translate-y-0', 'translate-y-20');
                    DOM.toast.classList.replace('opacity-100', 'opacity-0');
                }, 3500);
            }
            
            // Global Drag & Drop Events (Window level)
            static initGlobalDragDrop() {
                window.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    if(window.CurrentTool) DOM.dropzone.classList.replace('hidden', 'flex');
                });
                
                window.addEventListener('dragleave', (e) => {
                    e.preventDefault();
                    if (e.relatedTarget === null) DOM.dropzone.classList.replace('flex', 'hidden');
                });
                
                window.addEventListener('drop', (e) => {
                    e.preventDefault();
                    DOM.dropzone.classList.replace('flex', 'hidden');
                    if(window.CurrentTool && e.dataTransfer.files.length > 0) {
                        AppUI.processNewFiles(e.dataTransfer.files);
                    }
                });
            }
        }

        // 4. BOOTSTRAP APP
        document.addEventListener('DOMContentLoaded', () => {
            // Add custom animation to Tailwind safely via style tag
            document.head.insertAdjacentHTML('beforeend', '<style>@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } } .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }</style>');
            
            AppUI.renderToolsGrid();
            AppUI.initGlobalDragDrop();
        });
    </script>
