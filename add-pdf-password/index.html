<div class="flex flex-col gap-8 w-full">
  <div>
    <p class="text-xs font-bold text-gray-500 uppercase mb-2">Source File(s)</p>
    <div id="pdf-dropzone" class="relative group border-2 border-dashed border-blue-200 hover:border-blue-400 hover:bg-blue-50/30 rounded-xl p-10 flex flex-col items-center justify-center cursor-pointer bg-blue-50/10 transition-all duration-300">
      <input type="file" id="pdf-file-input" accept="application/pdf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
      <i class="fa-solid fa-cloud-arrow-up text-3xl text-blue-500 mb-3"></i>
      <p class="text-gray-700 font-semibold text-center text-sm">Drag & drop files or click to browse<br/>
        <span class="text-xs font-normal text-gray-400">Maximum speed processing</span>
      </p>
    </div>
    <div id="file-name-display" class="hidden mt-3 text-sm font-medium text-gray-600 bg-gray-50 border border-gray-200 px-4 py-2 rounded-lg flex justify-between items-center">
      <span id="file-name-text"></span>
      <i class="fa-solid fa-xmark text-red-400 cursor-pointer hover:text-red-600" onclick="document.getElementById('pdf-file-input').value=''; document.getElementById('file-name-display').classList.add('hidden'); window.activeFiles=[];"></i>
    </div>
  </div>

  <div class="flex flex-col gap-4 bg-gray-50 p-5 rounded-xl border border-gray-100">
    <div class="flex flex-col gap-2">
      <label for="pdf-password" class="text-sm font-semibold text-gray-700">Set Password</label>
      <input type="password" id="pdf-password" placeholder="Enter a secure password" class="w-full px-4 py-3 bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
    </div>
    <div class="flex flex-col gap-2">
      <label for="pdf-confirm-password" class="text-sm font-semibold text-gray-700">Re-enter Password</label>
      <input type="password" id="pdf-confirm-password" placeholder="Confirm your password" class="w-full px-4 py-3 bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
      <p id="password-error" class="hidden text-sm text-red-500 font-medium">Passwords do not match!</p>
    </div>
  </div>
</div>
