<div class="workspace w-full max-w-xl mx-auto p-8 bg-white/80 backdrop-blur-xl border border-white/40 shadow-2xl rounded-2xl flex flex-col gap-8 transition-all">
  
  <div class="text-center">
    <div class="w-14 h-14 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm border border-red-100">
      <i class="fa-solid fa-lock text-2xl"></i>
    </div>
    <h2 class="text-2xl font-bold text-gray-800 tracking-tight">Protect PDF</h2>
    <p class="text-gray-500 text-sm mt-1">Lock your document with AES-256 encryption.</p>
  </div>

  <div id="pdf-dropzone" class="relative group border-2 border-dashed border-gray-300 hover:border-red-400 hover:bg-red-50/30 rounded-xl p-12 flex flex-col items-center justify-center cursor-pointer bg-white/50 transition-all duration-300">
    <input type="file" id="pdf-file-input" accept="application/pdf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
    <i class="fa-solid fa-file-shield text-4xl text-gray-400 group-hover:text-red-400 transition-colors mb-4"></i>
    <p class="text-gray-700 font-medium text-center">Drag & drop your PDF here<br/>
      <span class="text-sm font-normal text-gray-400">or click to browse</span>
    </p>
    <div id="file-name-display" class="hidden mt-4 text-sm font-semibold text-red-600 bg-red-100 px-4 py-1.5 rounded-full z-20"></div>
  </div>

  <div class="flex flex-col gap-4">
    
    <div class="flex flex-col gap-2">
      <label for="pdf-password" class="text-sm font-semibold text-gray-700">Document Password</label>
      <div class="relative group">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <i class="fa-solid fa-key text-gray-400 group-focus-within:text-red-500 transition-colors"></i>
        </div>
        <input type="password" id="pdf-password" placeholder="Enter a secure password" class="w-full pl-11 pr-4 py-3.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition-all shadow-sm" />
      </div>
    </div>

    <div class="flex flex-col gap-2">
      <label for="pdf-confirm-password" class="text-sm font-semibold text-gray-700">Confirm Password</label>
      <div class="relative group">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <i class="fa-solid fa-check-double text-gray-400 group-focus-within:text-red-500 transition-colors"></i>
        </div>
        <input type="password" id="pdf-confirm-password" placeholder="Re-enter your password" class="w-full pl-11 pr-4 py-3.5 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition-all shadow-sm" />
      </div>
      <p id="password-error" class="hidden text-sm text-red-500 mt-1 font-medium"><i class="fa-solid fa-circle-exclamation mr-1"></i> Passwords do not match!</p>
    </div>

  </div>

  <button id="protect-btn" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-xl transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5 flex items-center justify-center gap-2">
    <i class="fa-solid fa-lock"></i> Encrypt & Save
  </button>
</div>
